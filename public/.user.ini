; PHP runtime limits for Eventy (picked up by PHP-FPM / CGI on most hosts).
; Ensures payment-proof screenshots (validated up to 4 MB) upload reliably
; and requests don't time out on slower connections.
upload_max_filesize = 12M
post_max_size = 16M
max_execution_time = 120
max_input_time = 120
memory_limit = 256M
